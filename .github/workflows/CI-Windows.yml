name: CI for Windows

on:
  push:
    branches: [ "main" ]
    paths:
      - 'include/**'
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'build-tools/utils.ts'
      - 'build-tools/build-Windows.ts'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  baseSetup:
    uses: ./.github/workflows/Base-Setup.yml
    with:
      host: Windows
      target: windows

  build:
    needs: baseSetup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup msvc-cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve msvc tools home path
        shell: pwsh
        run: |
          $libPath = (Get-Command lib.exe -ErrorAction Stop).Source
          $libDir = Split-Path -Parent $libPath
          Write-Host "Found lib.exe in: $libDir"
          "CI_MSVC_TOOLS_HOME=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: false

      - name: Cache vcpkg binary
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-binary-cache
          key: vcpkg-binary-cache-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Build
        env:
          CI_VCPKG_HOME: ${{ github.workspace }}\vcpkg
          CI_VCPKG_BINARY_SOURCES: "files,${{ github.workspace }}/vcpkg-binary-cache,readwrite"
        run: |
          cd build-tools
          npx tsx build-Windows.ts

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Windows-build
          path: |
            build.Windows/Release/output/
          if-no-files-found: error
