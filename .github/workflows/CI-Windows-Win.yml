name: CI-Windows-Win

on:
  push:
    branches: [ "main" ]
    paths:
      - 'include/**'
      - 'src/**'
      - 'test/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'tools/utils.ts'
      - 'tools/test/gtest-utils.ts'
      - 'tools/test/coverage-utils.ts'
      - 'tools/setup-llvm.ts'
      - 'tools/setup-vcpkg.ts'
      - 'tools/build/build-utils.ts'
      - 'tools/build/build-Windows.ts'
      - 'tools/routes.ts'
      - 'tools/package.json'
      - '.github/workflows/Base-Setup.yml'
      - '.github/workflows/CI-Windows-Win.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  baseSetup:
    uses: ./.github/workflows/Base-Setup.yml
    with:
      host: Windows
      target: windows

  build:
    needs: baseSetup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup msvc-cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      
      - name: Setup custom vcpkg
        shell: pwsh
        working-directory: ./tools
        run: |
          npm install
          npm run setup:llvm
          npm run setup:vcpkg

      - name: Cache vcpkg binary
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.USERPROFILE }}\vcpkg-binary-cache
          key: vcpkg-binary-cache-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Build
        working-directory: ./tools
        run: |
          npm run build:windows -- --test --coverage

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Win-build
          path: |
            build.Windows/Release/output/
          if-no-files-found: error
