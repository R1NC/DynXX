name: CI-OHOS-Win

on:
  push:
    branches: [ "main" ]
    paths:
      - 'include/**'
      - 'src/**'
      - 'test/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'tools/utils.ts'
      - 'tools/setup-vcpkg.ts'
      - 'tools/test/gtest-utils.ts'
      - 'tools/build/build-utils.ts'
      - 'tools/build/build-OHOS.ts'
      - 'tools/routes.ts'
      - 'tools/package.json'
      - '.github/workflows/Base-Setup.yml'
      - '.github/workflows/CI-OHOS-Win.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  baseSetup:
    uses: ./.github/workflows/Base-Setup.yml
    with:
      host: Windows
      target: harmonyos

  build:
    needs: baseSetup
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Cache HarmonyOS SDK
      id: cache-ohos-sdk
      uses: actions/cache@v4
      with:
        path: |
          ohos-sdk/windows/native
        key: ohos-sdk-windows-6.0.0.48-${{ runner.os }}
        restore-keys: |
          ohos-sdk-windows-6.0.0.48-

    - name: Setup HarmonyOS SDK
      if: steps.cache-ohos-sdk.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        curl.exe -L -# -o "ohos-sdk-windows_linux-public.tar.gz" "https://mirrors.huaweicloud.com/harmonyos/os/6.0.0.1-Release/ohos-sdk-windows_linux-public.tar.gz"
        tar -xzf ohos-sdk-windows_linux-public.tar.gz
        Set-Location ohos-sdk/windows
        Expand-Archive -Path "native-windows-x64-6.0.0.48-Release.zip" -DestinationPath "."

    - name: Set HarmonyOS Environment
      shell: pwsh
      run: |
        $ohosNdkHome = "${{ github.workspace }}/ohos-sdk/windows/native"
        Add-Content -Path $env:GITHUB_ENV -Value "CI_OHOS_NDK_HOME=$ohosNdkHome"

    - name: Setup custom vcpkg
      shell: pwsh
      working-directory: ./tools
      run: |
        npm install
        npm run setup:vcpkg

    - name: Cache vcpkg binary
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: ${{ env.USERPROFILE }}\vcpkg-binary-cache
        key: vcpkg-binary-cache-ohos-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

    - name: Build
      shell: pwsh
      working-directory: ./tools
      run: |
        npm run build:harmonyos -- --test

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OHOS-Win-build
        path: |
          build.OHOS/Release/output/
        if-no-files-found: error
