name: CI-iOS-Mac

on:
  push:
    branches: [ "main" ]
    paths:
      - 'include/**'
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'build-tools/utils.ts'
      - 'build-tools/setup-vcpkg.ts'
      - 'build-tools/build-iOS.ts'
      - 'build-tools/routes.ts'
      - 'build-tools/package.json'
      - '.github/workflows/Base-Setup.yml'
      - '.github/workflows/CI-iOS-Mac.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  baseSetup:
    uses: ./.github/workflows/Base-Setup.yml
    with:
      host: macOS
      target: ios

  build:
    needs: baseSetup
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup custom vcpkg
      working-directory: ./build-tools
      run: |
        npm install
        npm run setup:vcpkg

    - name: Cache vcpkg binary
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: ${{ env.HOME }}/vcpkg-binary-cache
        key: vcpkg-binary-cache-ios-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

    - name: Build
      working-directory: ./build-tools
      run: |
        npm run build:ios

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Mac-build
        path: |
          build.iOS/Release/output/
        if-no-files-found: error
