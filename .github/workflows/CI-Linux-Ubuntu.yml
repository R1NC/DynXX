name: CI-Linux-Ubuntu

on:
  push:
    branches: [ "main" ]
    paths:
      - 'include/**'
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'build-tools/utils.ts'
      - 'build-tools/setup-vcpkg.ts'
      - 'build-tools/build-Linux.ts'
      - '.github/workflows/Base-Setup.yml'
      - '.github/workflows/CI-Linux-Ubuntu.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  baseSetup:
    uses: ./.github/workflows/Base-Setup.yml
    with:
      host: Linux
      target: linux

  build:
    needs: baseSetup
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup custom vcpkg
      run: |
        cd build-tools
        npx tsx setup-vcpkg.ts

    - name: Cache vcpkg binary
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: ${{ env.HOME }}/vcpkg-binary-cache
        key: vcpkg-binary-cache-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

    - name: Build
      run: |
        cd build-tools
        npx tsx build-Linux.ts

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Linux-Ubuntu-build
        path: |
          build.Linux/Release/output/
        if-no-files-found: error
