name: CI-macOS-Mac

on:
  push:
    branches: [ "main" ]
    paths:
      - 'include/**'
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'build-tools/utils.ts'
      - 'build-tools/build-macOS.ts'
      - '.github/workflows/Base-Setup.yml'
      - '.github/workflows/CI-macOS-Mac.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  baseSetup:
    uses: ./.github/workflows/Base-Setup.yml
    with:
      host: macOS
      target: macos

  build:
    needs: baseSetup
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        runVcpkgInstall: false

    - name: Cache vcpkg binary
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg-binary-cache
        key: vcpkg-binary-cache-osx-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

    - name: Build
      env:
        CI_VCPKG_HOME: ${{ github.workspace }}/vcpkg
      run: |
        cd build-tools
        npx tsx build-macOS.ts

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macOS-Mac-build
        path: |
          build.macOS/Release/output/
        if-no-files-found: error
