name: CI for HarmonyOS on macOS

on:
  push:
    branches: [ "main" ]
    paths:
      - 'include/**'
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'build-tools/build_utils.py'
      - 'build-tools/build-HarmonyOS.py'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  baseSetup:
    uses: ./.github/workflows/Base-Setup.yml
    with:
      host: macOS
      target: harmonyos

  build:
    needs: baseSetup
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Cache HarmonyOS SDK
      id: cache-ohos-sdk
      uses: actions/cache@v4
      with:
        path: |
          sdk/packages/ohos-sdk/darwin/native
        key: ohos-sdk-darwin-6.0.0.48-${{ runner.os }}
        restore-keys: |
          ohos-sdk-darwin-6.0.0.48-

    - name: Setup HarmonyOS SDK
      if: steps.cache-ohos-sdk.outputs.cache-hit != 'true'
      run: |
        curl -L -o ohos-sdk-mac-public.tar.gz "https://mirrors.huaweicloud.com/harmonyos/os/6.0.0.1-Release/ohos-sdk-mac-public.tar.gz"
        tar -xzf ohos-sdk-mac-public.tar.gz
        cd sdk/packages/ohos-sdk/darwin
        unzip native-darwin-x64-6.0.0.48-Release.zip

    - name: Set HarmonyOS Environment
      run: |
        echo "CI_OHOS_NDK_HOME=${{ github.workspace }}/sdk/packages/ohos-sdk/darwin/native" >> $GITHUB_ENV

    - name: Setup custom vcpkg from zip
      run: |
        VCPKG_ROOT="${RUNNER_TEMP}/vcpkg"
        curl -L -o "${RUNNER_TEMP}/vcpkg-dev.zip" "https://github.com/R1NC/vcpkg/archive/refs/heads/dev.zip"
        unzip -q "${RUNNER_TEMP}/vcpkg-dev.zip" -d "${RUNNER_TEMP}"
        rm -rf "${VCPKG_ROOT}"
        mv "${RUNNER_TEMP}/vcpkg-dev" "${VCPKG_ROOT}"
        git -C "${VCPKG_ROOT}" init
        git -C "${VCPKG_ROOT}" config user.email "ci@local"
        git -C "${VCPKG_ROOT}" config user.name "ci"
        git -C "${VCPKG_ROOT}" add -A
        git -C "${VCPKG_ROOT}" commit -m "init vcpkg snapshot"
        export BASELINE="$(git -C "${VCPKG_ROOT}" rev-parse HEAD)"
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path
        vcpkg_json = Path(os.environ["GITHUB_WORKSPACE"]) / "vcpkg.json"
        data = json.loads(vcpkg_json.read_text(encoding="utf-8"))
        data["builtin-baseline"] = os.environ["BASELINE"]
        vcpkg_json.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
        PY
        "${VCPKG_ROOT}/bootstrap-vcpkg.sh"

    - name: Cache vcpkg binary
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg-binary-cache
        key: vcpkg-binary-cache-ohos-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

    - name: Build
      env:
        CI_VCPKG_HOME: ${{ runner.temp }}/vcpkg
        CI_VCPKG_BINARY_SOURCES: "files,${{ github.workspace }}/vcpkg-binary-cache,readwrite"
      run: |
        cd build-tools
        python3 build-HarmonyOS.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: HarmonyOS-build
        path: |
          build.HarmonyOS/Release/output/
        if-no-files-found: error
