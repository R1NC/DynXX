name: CI-WASM-Win

on:
  push:
    branches: [ "main" ]
    paths:
      - 'include/**'
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'build-tools/utils.ts'
      - 'build-tools/setup-vcpkg.ts'
      - 'build-tools/build-WASM.ts'
      - '.github/workflows/Base-Setup.yml'
      - '.github/workflows/CI-WASM-Win.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  baseSetup:
    uses: ./.github/workflows/Base-Setup.yml
    with:
      host: Windows
      target: wasm

  build:
    needs: baseSetup
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v12
      with:
        version: 3.1.65

    - name: Setup custom vcpkg
      shell: pwsh
      run: |
        Set-Location build-tools
        npx tsx setup-vcpkg.ts

    - name: Cache vcpkg binary
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: ${{ env.USERPROFILE }}\vcpkg-binary-cache
        key: vcpkg-binary-cache-wasm-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

    - name: Build
      shell: pwsh
      env:
        CI_WASM_SDK_HOME: "${{ env.EMSDK }}"
      run: |
        Set-Location build-tools
        npx tsx build-WASM.ts

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WASM-Win-build
        path: |
          build.Wasm/Release/output/
        if-no-files-found: error
